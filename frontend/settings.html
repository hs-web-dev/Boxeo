<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres du compte</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="container">

    <h1>⚙️ Paramètres du compte</h1>

    <!-- Email utilisateur -->
    <p id="settingsEmail"></p>

    <!-- Boutons -->
    <button class="home-btn" onclick="goHome()">Retour à l’accueil</button>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>

    <hr>

    <h2>Supprimer mon compte</h2>
    <p style="color:red;">Cette action est définitive.</p>

    <!-- Bouton supprimer -->
    <button class="delete-btn" onclick="deleteAccount()">Supprimer mon compte</button>

    <!-- Message de confirmation -->
    <p id="deleteWarning" style="color:#ff4d4d; margin-top:10px; display:none;">
        Êtes-vous sûr de vouloir supprimer votre compte ?
    </p>

    <!-- Boutons Oui / Non -->
    <div id="deleteConfirmButtons" style="display:none; margin-top:10px; gap:10px;">
        <button id="confirmDeleteYes" style="background:#ff4d4d; color:white; padding:8px 16px; border:none; border-radius:8px;">Oui</button>
        <button id="confirmDeleteNo" style="background:#334155; color:white; padding:8px 16px; border:none; border-radius:8px;">Non</button>
    </div>

</div>

<script src="settings.js"></script>
</body>
</html>
