<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxeo – Staff Dashboard</title>
    <link rel="stylesheet" href="staff.css">
</head>
<body>

<div class="container">

    <h1>📦 Boxeo — Interface Staff</h1>
    <p id="staffEmail"></p>

    <button class="logout-btn" onclick="logout()">Déconnexion</button>

    <hr>

    <!-- FORMULAIRE AJOUT / MODIF -->
    <h2 id="formTitle">Ajouter un garage</h2>

    <form id="garageForm">
        <input type="hidden" id="garageId">

        <input type="text" id="name" placeholder="Nom du garage" required>

        <!-- Adresse + suggestions -->
        <input type="text" id="address" placeholder="Adresse" required autocomplete="off">
        <div id="addressSuggestions" class="suggestions"></div>

        <!-- Nombre de places -->
        <input type="number" id="places" placeholder="Nombre de places" required>

        <!-- Type -->
        <select id="type">
            <option value="all">Tous</option>
            <option value="mensuel">Mensuel</option>
            <option value="heure">À l’heure</option>
            <option value="jour">À la journée</option>
        </select>

        <button type="submit">Enregistrer</button>
    </form>

    <hr>

    <!-- LISTE DES GARAGES -->
    <h2>Garages existants</h2>

    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Adresse</th>
                <th>Places</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="garageList"></tbody>
    </table>

</div>

<script src="staff.js"></script>
</body>
</html>
