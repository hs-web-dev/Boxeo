<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxeo – Staff Dashboard</title>
    <link rel="stylesheet" href="staff.css">
</head>
<body>

<div class="container">

    <h1>📦 Boxeo — Interface Staff</h1>
    <p id="staffEmail"></p>

    <button class="logout-btn" onclick="logout()">Déconnexion</button>
    <button class="home-btn" onclick="goHome()">Retour à l’accueil</button>

    <hr>

    <!-- 🔥 ZONE PROMOTION (MASTER ONLY) -->
    <div id="promotionZone" style="display:none; margin-bottom:30px;">
        <h2>Gestion du Staff</h2>

        <h3>Promouvoir un utilisateur</h3>
        <input type="email" id="promoteEmail" placeholder="Email à promouvoir">
        <button onclick="promoteUser()">Promouvoir</button>

        <h3 style="margin-top:20px;">Retirer un utilisateur du staff</h3>
        <input type="email" id="removeEmail" placeholder="Email à retirer">
        <button onclick="removeUser()">Retirer</button>
    </div>

    <hr>

    <!-- FORMULAIRE AJOUT / MODIF -->
    <h2 id="formTitle">Ajouter un garage</h2>

    <form id="garageForm">
        <input type="hidden" id="garageId">

        <input type="text" id="name" placeholder="Nom du garage" required>

        <input type="text" id="address" placeholder="Adresse" required autocomplete="off">
        <div id="addressSuggestions" class="suggestions"></div>

        <input type="number" id="places" placeholder="Nombre de places" required>

        <select id="type">
            <option value="all">Tous</option>
            <option value="mensuel">Mensuel</option>
            <option value="heure">À l’heure</option>
            <option value="jour">À la journée</option>
        </select>

        <button type="submit">Enregistrer</button>
    </form>

    <hr>

    <h2>Garages existants</h2>

    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Adresse</th>
                <th>Places</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="garageList"></tbody>
    </table>

</div>

<script src="staff.js"></script>
</body>
</html>
