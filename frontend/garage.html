<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage</title>

    <link rel="stylesheet" href="garage.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<!-- BACKGROUND SHAPES -->
<div class="bg-shape bg1"></div>
<div class="bg-shape bg2"></div>

<div class="garage-container">

    <h1 id="garageName"></h1>
    <p id="garageAddress"></p>
    <p id="garagePlaces"></p>
    <p id="garageType"></p>
    <p id="garageDimensions"></p>

    <div class="content-row">

        <!-- IMAGES -->
        <div class="images-block">
            <img id="mainImage" class="main-image" src="" alt="Garage">

            <div id="thumbContainer" class="thumbs"></div>
        </div>

        <!-- RESERVE BUTTON -->
        <div class="reserve-block">
            <button id="reserveBtn" class="reserve-btn">Réserver</button>
        </div>

    </div>

    <div id="map" class="garage-map"></div>

    <p id="garageDescription" class="garage-description"></p>

    <button onclick="goHome()" class="back-btn">Retour à l’accueil</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="garage.js"></script>

</body>
</html>
