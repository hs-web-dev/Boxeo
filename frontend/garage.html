<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage</title>

    <link rel="stylesheet" href="garage.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<!-- BACKGROUND SHAPES -->
<div class="bg-shape bg1"></div>
<div class="bg-shape bg2"></div>

<div class="garage-wrapper">

    <h1 id="garageName" class="title"></h1>

    <div class="info-line">
        <span id="garageAddress"></span>
        <span id="garagePlaces"></span>
        <span id="garageType"></span>
        <span id="garageDimensions"></span>
    </div>

    <div class="garage-content">

        <!-- IMAGE GALLERY -->
        <div class="gallery">
            <div class="slider">
                <img id="mainImage" class="main-image" src="" alt="Garage">
            </div>

            <div id="thumbContainer" class="thumbs"></div>
        </div>

        <!-- RESERVE ZONE -->
        <div class="reserve-zone">
            <p class="reserve-top-text">Besoin d’une place ?</p>

            <button id="reserveBtn" class="reserve-btn">Réserver</button>

            <p class="reserve-bottom-text">Réservation instantanée</p>
        </div>

    </div>

    <div id="map" class="garage-map"></div>

    <p id="garageDescription" class="garage-description"></p>

    <button onclick="goHome()" class="back-btn">Retour à l’accueil</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="garage.js"></script>

</body>
</html>
