<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage</title>

    <link rel="stylesheet" href="garage.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<div class="container">
    <h1 id="garageName">Chargement...</h1>
    <p id="garageAddress"></p>
    <p id="garagePlaces"></p>
    <p id="garageType"></p>
    <p id="garageDimensions"></p>

    <div class="garage-container">

        <div class="images-section">
            <img id="mainImage" class="main-image" src="" alt="Garage">

            <div class="small-images">
                <img class="small-img" id="img1" src="" alt="">
                <img class="small-img" id="img2" src="" alt="">
                <img class="small-img" id="img3" src="" alt="">
            </div>
        </div>

        <div class="info-section">
            <button id="reserveBtn" class="reserve-btn">Réserver</button>
        </div>

    </div>

    <div id="map" class="garage-map"></div>

    <p id="garageDescription" class="garage-description"></p>

    <button onclick="goHome()" class="back-btn">Retour à l’accueil</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="garage.js"></script>

</body>
</html>
